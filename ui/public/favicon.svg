<svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="robot-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
    <linearGradient id="robot-light-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>
  <!-- Head -->
  <rect x="28" y="25" width="64" height="52" rx="14" fill="url(#robot-gradient)"/>
  
  <!-- Antenna -->
  <rect x="54" y="10" width="12" height="15" rx="3" fill="url(#robot-gradient)"/>
  <circle cx="60" cy="8" r="6" fill="url(#robot-light-gradient)"/>
  
  <!-- Eyes (Large and expressive) -->
  <ellipse cx="45" cy="50" rx="10" ry="12" fill="#0f172a"/>
  <ellipse cx="75" cy="50" rx="10" ry="12" fill="#0f172a"/>
  <ellipse cx="47" cy="48" rx="6" ry="7" fill="#4ade80"/>
  <ellipse cx="77" cy="48" rx="6" ry="7" fill="#4ade80"/>
  
  <!-- Eye Sparkles -->
  <circle cx="44" cy="45" r="2" fill="#ffffff" opacity="0.9"/>
  <circle cx="50" cy="51" r="1" fill="#ffffff" opacity="0.6"/>
  <circle cx="74" cy="45" r="2" fill="#ffffff" opacity="0.9"/>
  <circle cx="80" cy="51" r="1" fill="#ffffff" opacity="0.6"/>
  
  <!-- Cheeks -->
  <ellipse cx="35" cy="62" rx="4" ry="2" fill="#4ade80" opacity="0.4"/>
  <ellipse cx="85" cy="62" rx="4" ry="2" fill="#4ade80" opacity="0.4"/>
  
  <!-- Mouth -->
  <path d="M52 65 Q60 72 68 65" stroke="#0f172a" stroke-width="3" stroke-linecap="round" fill="none"/>
  
  <!-- Neck -->
  <rect x="50" y="77" width="20" height="10" rx="3" fill="url(#robot-gradient)"/>
  
  <!-- Body -->
  <rect x="22" y="87" width="76" height="32" rx="8" fill="url(#robot-gradient)"/>
  
  <!-- Chest Display -->
  <rect x="35" y="94" width="50" height="18" rx="4" fill="#064e3b" opacity="0.4"/>
  <circle cx="45" cy="103" r="4" fill="#4ade80"/>
  <circle cx="60" cy="103" r="4" fill="#86efac"/>
  <circle cx="75" cy="103" r="4" fill="#4ade80"/>
</svg>